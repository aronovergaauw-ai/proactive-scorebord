name: Update Scorebord

on:
  schedule:
    - cron: '*/30 * * * *' # Laat het script elke 30 minuten draaien
  workflow_dispatch: # Zorgt dat we het ook handmatig kunnen starten met een knop

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Haal bestanden op
      uses: actions/checkout@v4

    - name: Installeer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installeer de browser robot (Playwright)
      run: |
        pip install playwright
        playwright install chromium

    - name: Start het inloggen en ophalen!
      env:
        SPOULE_EMAIL: ${{ secrets.SPOULE_EMAIL }}
        SPOULE_WACHTWOORD: ${{ secrets.SPOULE_WACHTWOORD }}
      run: python scrape.py

    - name: Sla het resultaat (index.html) op in GitHub
      run: |
        git config --global user.name "Scorebord Robot"
        git config --global user.email "robot@scorebord.nl"
        git add index.html
        git commit -m "Automatische update van het scorebord" || echo "Geen nieuwe score"
        git push
